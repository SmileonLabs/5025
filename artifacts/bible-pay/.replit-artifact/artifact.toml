kind = "web"
previewPath = "/"
title = "5025"
version = "1.0.0"
id = "artifacts/bible-pay"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23209

[services.development]
run = "pnpm --filter @workspace/bible-pay run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bible-pay", "run", "build" ]
publicDir = "artifacts/bible-pay/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23209"
BASE_PATH = "/"
